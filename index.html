<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smile Sunshine</title>

<style>
body {
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#f7b6d2;
}

.paper {
    width:80%;
    max-width:500px;
    padding:50px;
    background:#fff0f5;
    border-radius:20px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
    text-align:center;
}

#text {
    font-family:cursive;
    font-size:45px;
    color:#8a4f6d;
    white-space:pre-line;
}

</style>

</head>

<body>

<div class="paper">
    <div id="text"></div>
</div>

<script>

let message = Hi Sunshine...

Let me see your gorgeous smile...;

let i = 0;

function typeWriter(){

    if(i < message.length){

        document.getElementById("text").innerHTML += message.charAt(i);
        i++;

        setTimeout(typeWriter,150);

    }

}

typeWriter();

</script>

</body>
</html>
