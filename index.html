<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Smile Sunshine</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: #ffe4ee;
}

#text {
  width: 80%;
  text-align: center;
  font-family: cursive;
  font-size: 50px;
  color: #8a4f6d;
}
</style>

</head>

<body>

<div id="text"></div>

<script>

let message = "Hi Sunshine...\n\nLet me see your gorgeous smile...";
let i = 0;

function typeWriter() {
  if (i < message.length) {
    document.getElementById("text").innerHTML += message[i];
    i++;
    setTimeout(typeWriter, 150);
  }
}

typeWriter();

</script>

</body>
</html>
